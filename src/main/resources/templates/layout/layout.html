<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background: #1f2937; color: white; padding: 0 1rem; display: flex; align-items: center; height: 56px; position: relative; }
        .nav-brand { font-weight: bold; font-size: 1.25rem; }
        .nav-brand a { color: white; text-decoration: none; }
        .nav-spacer { flex: 1; }
        .nav-menu { list-style: none; display: flex; gap: 1.5rem; }
        .nav-menu a { color: #d1d5db; text-decoration: none; }
        .nav-menu a:hover { color: white; }
        .hamburger { background: none; border: none; cursor: pointer; padding: 4px; }
        .hamburger span { display: block; width: 24px; height: 3px; background: white; margin: 4px 0; border-radius: 2px; }
        .sidebar { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: #111827; color: white; transition: left 0.3s; padding: 1rem; z-index: 1000; }
        .sidebar.open { left: 0; }
        .sidebar h3 { margin-bottom: 1rem; font-size: 1.1rem; color: #9ca3af; }
        .sidebar a { display: block; color: #d1d5db; text-decoration: none; padding: 0.5rem 0; }
        .sidebar a:hover { color: white; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.show { display: block; }
        .main-content { flex: 1; padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; }
        .footer { background: #1f2937; color: #9ca3af; text-align: center; padding: 1rem; font-size: 0.875rem; margin-top: auto; }
    </style>
</head>
<body>

<nav class="navbar" th:fragment="navbar">
    <button class="hamburger" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </button>
    <div class="nav-brand">
        <a href="/api/v1/">GarageSystem</a>
    </div>
    <div class="nav-spacer"></div>
    <ul class="nav-menu">
        <li><a href="/api/v1/client">Clientes</a></li>
        <li><a href="/api/v1/vehicle">Vehiculos</a></li>
        <li><a href="/api/v1/quote">Presupuestos</a></li>
        <li><a href="/api/v1/repair-order">Ordenes</a></li>
    </ul>
</nav>

<div class="sidebar" id="sidebar" th:fragment="sidebar">
    <h3>Configuracion</h3>
    <a href="/api/v1/company">Company</a>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()" th:fragment="overlay"></div>

<main class="main-content" th:fragment="content">
</main>

<footer class="footer" th:fragment="footer">
    <p>&copy; <span>2026</span> Sistema de Gestion de Taller. Todos los derechos reservados.</p>
    <p>Desarrollado por Ariel Zarate</p>
</footer>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
    }
</script>
</body>
</html>
