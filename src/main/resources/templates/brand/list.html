<div th:fragment="content" class="border border-outline-variant bg-surface-container rounded-md overflow-hidden">

    <!-- Header -->
    <div class="bg-surface-container px-4 py-2 border-b border-outline-variant flex items-center justify-between">
        <h1 class="text-sm font-bold text-on-surface">Marcas</h1>
        <button onclick="openCreateModal()"
                class="bg-primary text-on-primary border border-outline-variant px-2 py-1 rounded-sm hover:bg-primary/80">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke-width="2"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v8m-4-4h8"/>
            </svg>
        </button>
    </div>

    <!-- Body -->
    <div class="p-4">

        <!-- Buscador -->
        <th:block th:replace="~{fragments/components/search :: searchInput(baseUrl='/brand', placeholder='Buscar por nombre...', query='searchQuery')}"></th:block>

        <!-- Tabla -->
        <div class="border border-outline-variant overflow-x-auto overflow-y-auto max-h-[calc(100vh-320px)]">
            <table class="w-full text-xs text-on-surface">
                <thead>
                <tr class="bg-surface-container-low text-on-surface/60 uppercase font-semibold">
                    <th class="px-2 py-2 text-left border-b border-outline-variant">Nombre</th>
                    <th class="px-2 py-2 text-center border-b border-outline-variant">Acciones</th>
                    <th class="px-2 py-2 text-center border-b border-outline-variant">Modelos</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${brands}"
                    class="hover:bg-surface-container-low even:bg-surface-container-low/50 border-b border-outline-variant">
                    <td class="px-2 py-2 flex items-center gap-1.5">
                        <span th:if="${brandsWithModels.get(b.id)}" class="inline-block w-2 h-2 bg-green-500 rounded-full shrink-0" title="Tiene modelos"></span>
                        <span th:unless="${brandsWithModels.get(b.id)}" class="inline-block w-2 h-2 bg-gray-300 rounded-full shrink-0" title="Sin modelos"></span>
                        <span th:text="${#strings.toUpperCase(b.name)}"></span>
                    </td>
                    <td class="px-2 py-2 text-center">
                        <div class="flex items-center justify-center gap-0.5">
                            <th:block th:replace="~{fragments/components/UI/button :: btnEditInline(dataId=${b.id}, dataName=${b.name})}"></th:block>
                            <th:block th:replace="~{fragments/components/UI/button :: btnDelete(actionUrl='/brand/' + ${b.id} + '/delete', msg='¿Eliminar marca?')}"></th:block>
                        </div>
                    </td>
                    <td class="px-2 py-2 text-center">
                        <div class="flex items-center justify-center gap-0.5">
                            <a th:href="@{/brand/__${b.id}__/models}"
                               class="flex items-center gap-1 p-1.5 rounded hover:bg-primary-container text-primary transition underline underline-offset-2" title="Ver modelos">
                                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6"/>
                                </svg>
                                <span class="text-xs">Ver modelos</span>
                            </a>
                        </div>
                    </td>
                </tr>
                <!-- Fila vacía -->
                <tr th:if="${#lists.isEmpty(brands)}">
                    <td colspan="3" class="px-3 py-12 text-center text-on-surface/40">
                        <p class="text-sm mb-1">No hay marcas registradas</p>
                        <p class="text-xs">Creá la primera marca</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>


    <th:block th:replace="~{fragments/components/UI/modal :: modal(modalId='modal-brand', title='Nueva Marca', content='brand/createForm')}"></th:block>

    <script th:src="@{/js/edit.js}"></script>
    <script th:src="@{/js/modal-form.js}"></script>
</div>
