<div th:fragment="content">
    <h1 class="text-2xl font-bold mb-6">Panel de Control</h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

        <a th:href="@{/customer}"
           class="block bg-white shadow rounded-lg p-6 hover:shadow-lg transition border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800">Clientes</h2>
            <p class="text-sm text-gray-600 mt-1">Gestionar clientes del taller</p>
        </a>

        <a th:href="@{/vehicle}"
           class="block bg-white shadow rounded-lg p-6 hover:shadow-lg transition border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800">Vehículos</h2>
            <p class="text-sm text-gray-600 mt-1">Registrar y consultar vehículos</p>
        </a>

        <a th:href="@{/quote}"
           class="block bg-white shadow rounded-lg p-6 hover:shadow-lg transition border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800">Presupuestos</h2>
            <p class="text-sm text-gray-600 mt-1">Crear y gestionar presupuestos</p>
        </a>

        <a th:href="@{/repair-order}"
           class="block bg-white shadow rounded-lg p-6 hover:shadow-lg transition border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800">Órdenes de Reparación</h2>
            <p class="text-sm text-gray-600 mt-1">Ordenes de reparación activas</p>
        </a>

        <a th:href="@{/employee}"
           class="block bg-white shadow rounded-lg p-6 hover:shadow-lg transition border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800">Empleados</h2>
            <p class="text-sm text-gray-600 mt-1">Administrar empleados del taller</p>
        </a>

        <a th:href="@{/company}"
           class="block bg-white shadow rounded-lg p-6 hover:shadow-lg transition border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800">Compañía</h2>
            <p class="text-sm text-gray-600 mt-1">Configuración del taller</p>
        </a>

    </div>
</div>
