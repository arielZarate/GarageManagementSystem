<div th:fragment="content">
    <h1 class="text-2xl font-bold text-on-surface mb-6">Panel de Control</h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

        <a th:href="@{/customer}"
           class="block bg-surface-container shadow rounded-lg p-6 hover:shadow-lg transition border border-outline-variant">
            <h2 class="text-lg font-bold text-on-surface">Clientes</h2>
            <p class="text-sm text-on-surface/60 mt-1">Gestionar clientes del taller</p>
        </a>

        <a th:href="@{/vehicle}"
           class="block bg-surface-container shadow rounded-lg p-6 hover:shadow-lg transition border border-outline-variant">
            <h2 class="text-lg font-bold text-on-surface">Vehículos</h2>
            <p class="text-sm text-on-surface/60 mt-1">Registrar y consultar vehículos</p>
        </a>

        <a th:href="@{/quote}"
           class="block bg-surface-container shadow rounded-lg p-6 hover:shadow-lg transition border border-outline-variant">
            <h2 class="text-lg font-bold text-on-surface">Presupuestos</h2>
            <p class="text-sm text-on-surface/60 mt-1">Crear y gestionar presupuestos</p>
        </a>

        <a th:href="@{/repair-order}"
           class="block bg-surface-container shadow rounded-lg p-6 hover:shadow-lg transition border border-outline-variant">
            <h2 class="text-lg font-bold text-on-surface">Órdenes de Reparación</h2>
            <p class="text-sm text-on-surface/60 mt-1">Ordenes de reparación activas</p>
        </a>

        <a th:href="@{/employee}"
           class="block bg-surface-container shadow rounded-lg p-6 hover:shadow-lg transition border border-outline-variant">
            <h2 class="text-lg font-bold text-on-surface">Empleados</h2>
            <p class="text-sm text-on-surface/60 mt-1">Administrar empleados del taller</p>
        </a>

        <a th:href="@{/company}"
           class="block bg-surface-container shadow rounded-lg p-6 hover:shadow-lg transition border border-outline-variant">
            <h2 class="text-lg font-bold text-on-surface">Empresa</h2>
            <p class="text-sm text-on-surface/60 mt-1">Configuración de informacion general</p>
        </a>

    </div>
</div>
