<div th:fragment="content">
    <div class="flex items-center justify-between mb-4">
        <div>
            <h1 class="text-xl font-bold text-on-surface">
                <span th:text="${employee.firstName} + ' ' + ${employee.lastName}"></span>
                <span class="text-on-surface/40 font-normal text-base" th:text="'(' + ${employee.legajo} + ')'"></span>
            </h1>
            <p class="text-xs text-on-surface/60">Detalle del empleado</p>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <!-- Datos personales -->
        <div class="bg-surface-container rounded-lg shadow border border-outline-variant p-4">
            <h2 class="text-sm font-semibold text-on-surface mb-3 pb-1 border-b border-outline-variant">Datos Personales</h2>
            <dl class="space-y-2 text-sm">
                <div class="flex justify-between">
                    <dt class="text-on-surface/60">Legajo</dt>
                    <dd class="text-on-surface font-medium" th:text="${employee.legajo}"></dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-on-surface/60">DNI</dt>
                    <dd class="text-on-surface">
                        <span class="inline-flex items-center gap-0.5 relative group">
                            <span th:text="${employee.dni}"></span>
                            <button class="inline-flex items-center justify-center p-0.5 border-0 bg-transparent text-slate-400 rounded cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity duration-150 hover:text-indigo-500 hover:bg-indigo-50" th:data-copy="${employee.dni}" title="Copiar DNI">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                            </button>
                            <span class="absolute bottom-full left-1/2 -translate-x-1/2 scale-90 bg-slate-800 text-slate-50 text-[0.625rem] px-2 py-0.5 rounded whitespace-nowrap opacity-0 pointer-events-none transition-all duration-150">Copiado</span>
                        </span>
                    </dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-on-surface/60">CUIT</dt>
                    <dd class="text-on-surface font-mono text-xs">
                        <span class="inline-flex items-center gap-0.5 relative group">
                            <span th:with="c=${employee.CUIT}" th:text="${#strings.substring(c,0,2)} + '-' + ${#strings.substring(c,2,10)} + '-' + ${#strings.substring(c,10)}"></span>
                            <button class="inline-flex items-center justify-center p-0.5 border-0 bg-transparent text-slate-400 rounded cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity duration-150 hover:text-indigo-500 hover:bg-indigo-50" th:data-copy="${employee.CUIT}" title="Copiar CUIT">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                            </button>
                            <span class="absolute bottom-full left-1/2 -translate-x-1/2 scale-90 bg-slate-800 text-slate-50 text-[0.625rem] px-2 py-0.5 rounded whitespace-nowrap opacity-0 pointer-events-none transition-all duration-150">Copiado</span>
                        </span>
                    </dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-on-surface/60">Fecha de Nacimiento</dt>
                    <dd class="text-on-surface" th:text="${employee.birthDate}"></dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-on-surface/60">Fecha de Ingreso</dt>
                    <dd class="text-on-surface" th:text="${employee.joinDate}"></dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-on-surface/60">Estado</dt>
                    <dd class="flex items-center gap-2">
                        <span th:if="${employee.active}"
                              class="inline-flex items-center gap-1 bg-green-100 text-green-700 text-xs font-medium px-2 py-0.5 rounded-full">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                            Activo
                        </span>
                        <span th:unless="${employee.active}"
                              class="inline-flex items-center gap-1 bg-red-100 text-red-700 text-xs font-medium px-2 py-0.5 rounded-full">
                            <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                            Inactivo
                        </span>
                    </dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-on-surface/60">Role</dt>
                    <dd class="text-on-surface">
                        <span class="bg-secondary-container text-on-secondary-container text-xs font-medium px-2 py-1 rounded" th:text="${employee.role.displayName}"></span>
                    </dd>
                </div>
            </dl>
        </div>

        <!-- Contacto -->
        <div class="bg-surface-container rounded-lg shadow border border-outline-variant p-4">
            <h2 class="text-sm font-semibold text-on-surface mb-3 pb-1 border-b border-outline-variant">Contacto</h2>
            <dl class="space-y-2 text-sm">
                <div class="flex justify-between">
                    <dt class="text-on-surface/60">Email</dt>
                    <dd class="text-on-surface">
                        <span class="inline-flex items-center gap-0.5 relative group">
                            <span th:text="${employee.email}"></span>
                            <button class="inline-flex items-center justify-center p-0.5 border-0 bg-transparent text-slate-400 rounded cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity duration-150 hover:text-indigo-500 hover:bg-indigo-50" th:data-copy="${employee.email}" title="Copiar email">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                            </button>
                            <span class="absolute bottom-full left-1/2 -translate-x-1/2 scale-90 bg-slate-800 text-slate-50 text-[0.625rem] px-2 py-0.5 rounded whitespace-nowrap opacity-0 pointer-events-none transition-all duration-150">Copiado</span>
                        </span>
                    </dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-on-surface/60">Teléfono</dt>
                    <dd class="text-on-surface" th:text="${employee.phone}"></dd>
                </div>
            </dl>
        </div>

        <!-- Dirección -->
        <div class="md:col-span-2 bg-surface-container rounded-lg shadow border border-outline-variant p-4">
            <h2 class="text-sm font-semibold text-on-surface mb-3 pb-1 border-b border-outline-variant">Dirección</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                <div>
                    <p class="text-xs text-on-surface/60">Provincia</p>
                    <p class="text-on-surface" th:text="${employee.address?.province ?: '-'}"></p>
                </div>
                <div>
                    <p class="text-xs text-on-surface/60">Ciudad</p>
                    <p class="text-on-surface" th:text="${employee.address?.city ?: '-'}"></p>
                </div>
                <div>
                    <p class="text-xs text-on-surface/60">Barrio</p>
                    <p class="text-on-surface" th:text="${employee.address?.neighborhood ?: '-'}"></p>
                </div>
                <div>
                    <p class="text-xs text-on-surface/60">Calle</p>
                    <p class="text-on-surface" th:text="|${employee.address?.street ?: '-'} ${employee.address?.number ?: ''}|"></p>
                </div>
                <div>
                    <p class="text-xs text-on-surface/60">Código Postal</p>
                    <p class="text-on-surface" th:text="${employee.address?.postalCode ?: '-'}"></p>
                </div>
                <div>
                    <p class="text-xs text-on-surface/60">País</p>
                    <p class="text-on-surface" th:text="${employee.address?.country ?: '-'}"></p>
                </div>
            </div>
        </div>

    </div>

    <!-- Botones -->
    <div class="flex items-center gap-2 mt-4">
        <a th:href="@{/employee/edit/{id}(id=${employee.id})}"
           class="border border-outline hover:bg-surface-container hover:border-on-surface/20 text-on-surface px-4 py-1.5 rounded-lg text-sm font-medium transition flex items-center gap-1.5 hover:scale-[1.02] active:scale-[0.98]">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
            Editar
        </a>
        <a th:href="@{/employee}"
           class="text-on-surface/60 hover:text-on-surface font-medium px-4 py-1.5 rounded-lg text-sm transition border border-outline hover:bg-surface-container hover:border-on-surface/20 ml-auto">
            Volver
        </a>
    </div>
</div>

<script th:src="@{/js/cuit-mask.js}"></script>
