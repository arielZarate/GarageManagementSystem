<div th:fragment="content" class="border border-outline-variant bg-surface-container rounded-md overflow-hidden">

    <!-- Header -->
    <div class="bg-primary/80 dark:bg-slate-900/90 px-4 py-2 border-b border-outline-variant flex items-center justify-between">
        <h1 class="text-sm font-bold text-white">
            <span th:text="${employee.firstName} + ' ' + ${employee.lastName}"></span>
            <span class="text-white/60 font-normal" th:text="'(' + ${employee.legajo} + ')'"></span>
        </h1>
    </div>

    <!-- Body -->
    <div class="p-4">

        <div class="flex flex-wrap gap-4">

            <!-- Datos personales -->
            <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                <legend class="text-xs font-semibold text-on-surface px-1">Datos Personales</legend>
                <table class="w-full text-xs">
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap w-1/3">Legajo</td>
                        <td class="text-on-surface font-medium py-1" th:text="${employee.legajo}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">DNI</td>
                        <td class="text-on-surface py-1" th:text="${employee.dni}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">CUIT</td>
                        <td class="text-on-surface font-mono py-1">
                            <span th:with="c=${employee.CUIT}" th:text="${#strings.substring(c,0,2)} + '-' + ${#strings.substring(c,2,10)} + '-' + ${#strings.substring(c,10)}"></span>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Nacimiento</td>
                        <td class="text-on-surface py-1" th:text="${employee.birthDate}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Ingreso</td>
                        <td class="text-on-surface py-1" th:text="${employee.joinDate}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Estado</td>
                        <td class="py-1">
                            <th:block th:replace="~{fragments/components/UI/list-input :: statusBadge(field='employee.active')}"></th:block>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Role</td>
                        <td class="py-1">
                            <span class="bg-secondary-container text-on-secondary-container text-xs font-medium px-2 py-1 rounded" th:text="${employee.role.displayName}"></span>
                        </td>
                    </tr>
                </table>
            </fieldset>

            <!-- Contacto -->
            <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                <legend class="text-xs font-semibold text-on-surface px-1">Contacto</legend>
                <table class="w-full text-xs">
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap w-1/3">Email</td>
                        <td class="text-on-surface py-1" th:text="${employee.email}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Teléfono</td>
                        <td class="text-on-surface py-1" th:text="${employee.phone}"></td>
                    </tr>
                </table>
            </fieldset>

            <!-- Dirección -->
            <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                <legend class="text-xs font-semibold text-on-surface px-1">Dirección</legend>
                <table class="w-full text-xs">
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap w-1/3">Provincia</td>
                        <td class="text-on-surface py-1" th:text="${employee.address?.province ?: '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Ciudad</td>
                        <td class="text-on-surface py-1" th:text="${employee.address?.city ?: '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Barrio</td>
                        <td class="text-on-surface py-1" th:text="${employee.address?.neighborhood ?: '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Calle</td>
                        <td class="text-on-surface py-1" th:text="|${employee.address?.street ?: '-'} ${employee.address?.number ?: ''}|"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">C.P.</td>
                        <td class="text-on-surface py-1" th:text="${employee.address?.postalCode ?: '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">País</td>
                        <td class="text-on-surface py-1" th:text="${employee.address?.country ?: '-'}"></td>
                    </tr>
                </table>
            </fieldset>

        </div>

    </div>

    <!-- Footer -->
    <div class="px-4 pt-3 pb-6 border-t border-outline-variant flex items-center justify-between">
        <div class="flex items-center gap-2">
            <th:block th:replace="~{fragments/components/UI/button :: btnEdit(baseUrl='/employee/edit', id=${employee.id})}"></th:block>
            <th:block th:replace="~{fragments/components/UI/button :: btnBack(url='/employee')}"></th:block>
        </div>
    </div>
    <div class="bg-primary/80 dark:bg-slate-900/90" style="height: 20px"></div>

</div>
