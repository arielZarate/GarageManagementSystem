<div th:fragment="content" class="border border-outline-variant bg-surface-container rounded-md overflow-hidden">

    <!-- Header -->
    <div class="bg-primary/80 dark:bg-slate-900/90 px-4 py-2 border-b border-outline-variant">
        <h1 class="text-sm font-bold text-white" th:text="${editMode} ? 'Editar Empleado' : 'Nuevo Empleado'"></h1>
    </div>

    <!-- Body -->
    <div class="p-4">
        <form th:object="${employeeObject}" method="post"
              th:action="${editMode} ? @{/employee/update} : @{/employee}">

            <input type="hidden" th:field="*{id}" th:if="${editMode}"/>

            <!-- Errores globales -->
            <div th:if="${#fields.hasGlobalErrors()}"
                 class="bg-error-container border border-error-container text-on-error-container px-3 py-2 mb-3 text-xs">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>

            <div class="flex flex-wrap gap-4">

                <!-- Datos personales -->
                <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                    <legend class="text-xs font-semibold text-on-surface px-1">Datos Personales</legend>
                    <table class="w-full">
                        <th:block th:replace="~{fragments/components/UI/form-input :: formCode(label='Legajo', field='legajo', editable=false)}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Nombres', field='firstName', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Apellido', field='lastName', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='DNI', field='dni', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInputCuit}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Nacimiento', field='birthDate', type='date')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Teléfono', field='phone', type='text')}"></th:block>
                    </table>
                </fieldset>

                <!-- Contacto -->
                <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                    <legend class="text-xs font-semibold text-on-surface px-1">Contacto</legend>
                    <table class="w-full">
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Email', field='email', type='email')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formSelect(label='Role', field='role', listExpr='roles', valueExpr='name()', textExpr='displayName', emptyOption=true)}"></th:block>
                        <tr>
                            <td class="w-24 py-1 pr-2">
                                <label class="text-xs text-on-surface/60">Contraseña</label>
                            </td>
                            <td class="py-1">
                                <input type="password" th:field="*{password}"
                                       class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none">
                                <p th:if="${editMode}" class="text-[10px] text-on-surface/40 mt-0.5">Dejá vacío si no querés cambiarla</p>
                            </td>
                        </tr>
                    </table>
                </fieldset>

                <!-- Dirección -->
                <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                    <legend class="text-xs font-semibold text-on-surface px-1">Dirección</legend>
                    <table class="w-full">
                        <th:block th:replace="~{fragments/components/UI/form-input :: formSelect(label='Provincia', field='province', listExpr='provinces', valueExpr='displayName', textExpr='displayName', emptyOption=false)}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Ciudad', field='city', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Barrio', field='neighborhood', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Calle', field='street', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Número', field='number', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='C.P.', field='postalCode', type='text')}"></th:block>
                        <tr>
                            <td class="w-24 py-1 pr-2">
                                <label class="text-xs text-on-surface/60">País</label>
                            </td>
                            <td class="py-1">
                                <input type="text" th:field="*{country}"
                                       class="w-full border border-outline-variant bg-surface-container-low/50 text-on-surface/60 px-2 py-1 text-xs cursor-not-allowed select-none outline-none"
                                       readonly unselectable="on" tabindex="-1">
                            </td>
                        </tr>
                        <th:block th:if="${editMode}">
                            <th:block th:replace="~{fragments/components/UI/form-input :: statusRadio(field='active')}"></th:block>
                        </th:block>
                    </table>
                </fieldset>

            </div>

            <!-- Footer -->
            <div class="flex items-center gap-2 pt-3 mt-4 border-t border-outline-variant">

                <th:block th:replace="~{fragments/components/UI/button :: btnSubmit}"></th:block>
                <th:block th:replace="~{fragments/components/UI/button :: btnBack(url='/employee')}"></th:block>
            </div>

        </form>
    </div>

    <div class="bg-primary/80 dark:bg-slate-900/90" style="height: 20px"></div>

</div>

<script th:src="@{/js/cuit-mask.js}"></script>
