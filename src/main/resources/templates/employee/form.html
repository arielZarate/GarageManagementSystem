<div th:fragment="content" class="border border-outline-variant bg-surface-container rounded-md overflow-hidden">

    <!-- Header -->
    <div class="bg-primary/80 dark:bg-slate-900/90 px-4 py-2 border-b border-outline-variant">
        <h1 class="text-sm font-bold text-white" th:text="${editMode} ? 'Editar Empleado' : 'Nuevo Empleado'"></h1>
    </div>

    <!-- Body -->
    <div class="p-4">
        <form th:object="${employeeObject}" method="post"
              th:action="${editMode} ? @{/employee/update} : @{/employee}">

            <input type="hidden" th:field="*{id}" th:if="${editMode}"/>

            <!-- Errores globales -->
            <div th:if="${#fields.hasGlobalErrors()}"
                 class="bg-error-container border border-error-container text-on-error-container px-3 py-2 mb-3 text-xs">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>

            <div class="flex flex-wrap gap-4">

                <!-- Datos personales -->
                <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                    <legend class="text-xs font-semibold text-on-surface px-1">Datos Personales</legend>
                    <table class="w-full text-xs">
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap w-1/3 align-top">Nombres</td>
                            <td class="py-1">
                                <input type="text" th:field="*{firstName}"
                                       class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none"
                                       th:classappend="${#fields.hasErrors('firstName')} ? 'border-error' : ''">
                                <span th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="text-error text-xs"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap align-top">Apellido</td>
                            <td class="py-1">
                                <input type="text" th:field="*{lastName}"
                                       class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none"
                                       th:classappend="${#fields.hasErrors('lastName')} ? 'border-error' : ''">
                                <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="text-error text-xs"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap align-top">DNI</td>
                            <td class="py-1">
                                <input type="text" th:field="*{dni}"
                                       class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none"
                                       th:classappend="${#fields.hasErrors('dni')} ? 'border-error' : ''">
                                <span th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}" class="text-error text-xs"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap align-top">CUIT</td>
                            <td class="py-1">
                                <input type="text" th:field="*{cuit}" class="cuit-mask w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none"
                                       th:classappend="${#fields.hasErrors('cuit')} ? 'border-error' : ''"
                                       placeholder="XX-XXXXXXXX-X" maxlength="13">
                                <span th:if="${#fields.hasErrors('cuit')}" th:errors="*{cuit}" class="text-error text-xs"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Nacimiento</td>
                            <td class="py-1">
                                <input type="date" th:field="*{birthDate}"
                                       class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none">
                            </td>
                        </tr>
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap align-top">Teléfono</td>
                            <td class="py-1">
                                <input type="text" th:field="*{phone}"
                                       class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'border-error' : ''">
                                <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-error text-xs"></span>
                            </td>
                        </tr>
                    </table>
                </fieldset>

                <!-- Contacto -->
                <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                    <legend class="text-xs font-semibold text-on-surface px-1">Contacto</legend>
                    <table class="w-full text-xs">
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap w-1/3 align-top">Email</td>
                            <td class="py-1">
                                <input type="email" th:field="*{email}"
                                       class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none"
                                       th:classappend="${#fields.hasErrors('email')} ? 'border-error' : ''">
                                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-error text-xs"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap align-top">Role</td>
                            <td class="py-1">
                                <select th:field="*{role}"
                                        class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none"
                                        th:classappend="${#fields.hasErrors('role')} ? 'border-error' : ''">
                                    <option value="">Seleccione...</option>
                                    <option th:each="r: ${roles}" th:value="${r.name()}" th:text="${r.displayName}"></option>
                                </select>
                                <span th:if="${#fields.hasErrors('role')}" th:errors="*{role}" class="text-error text-xs"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap align-top">Contraseña</td>
                            <td class="py-1">
                                <input type="password" th:field="*{password}"
                                       class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none">
                                <p th:if="${editMode}" class="text-[10px] text-on-surface/40 mt-0.5">Dejá vacío si no querés cambiarla</p>
                            </td>
                        </tr>
                    </table>
                </fieldset>

                <!-- Dirección -->
                <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                    <legend class="text-xs font-semibold text-on-surface px-1">Dirección</legend>
                    <table class="w-full text-xs">
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap w-1/3 align-top">Provincia</td>
                            <td class="py-1">
                                <select th:field="*{province}"
                                        class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none"
                                        th:classappend="${#fields.hasErrors('province')} ? 'border-error' : ''">
                                    <option th:each="p : ${provinces}" th:value="${p.displayName}" th:text="${p.displayName}"></option>
                                </select>
                                <span th:if="${#fields.hasErrors('province')}" th:errors="*{province}" class="text-error text-xs"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap align-top">Ciudad</td>
                            <td class="py-1">
                                <input type="text" th:field="*{city}"
                                       class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none"
                                       th:classappend="${#fields.hasErrors('city')} ? 'border-error' : ''">
                                <span th:if="${#fields.hasErrors('city')}" th:errors="*{city}" class="text-error text-xs"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Barrio</td>
                            <td class="py-1">
                                <input type="text" th:field="*{neighborhood}"
                                       class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none">
                            </td>
                        </tr>
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap align-top">Calle</td>
                            <td class="py-1">
                                <input type="text" th:field="*{street}"
                                       class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none"
                                       th:classappend="${#fields.hasErrors('street')} ? 'border-error' : ''">
                                <span th:if="${#fields.hasErrors('street')}" th:errors="*{street}" class="text-error text-xs"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Número</td>
                            <td class="py-1">
                                <input type="text" th:field="*{number}"
                                       class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none">
                            </td>
                        </tr>
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">C.P.</td>
                            <td class="py-1">
                                <input type="text" th:field="*{postalCode}"
                                       class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none">
                            </td>
                        </tr>
                        <tr>
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap align-top">País</td>
                            <td class="py-1">
                                <select th:field="*{country}"
                                        class="w-full border border-outline-variant bg-surface-container-low text-on-surface px-2 py-1 text-xs focus:border-on-surface focus:outline-none">
                                    <option th:each="c : ${countries}" th:value="${c.displayName}" th:text="${c.displayName}"></option>
                                </select>
                            </td>
                        </tr>
                        <tr th:if="${editMode}">
                            <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Estado</td>
                            <td class="py-1">
                                <div class="flex items-center gap-4">
                                    <label class="flex items-center gap-1 cursor-pointer">
                                        <input type="radio" th:field="*{active}" th:value="true"
                                               class="accent-green-500">
                                        <span class="text-xs text-on-surface">Activo</span>
                                    </label>
                                    <label class="flex items-center gap-1 cursor-pointer">
                                        <input type="radio" th:field="*{active}" th:value="false"
                                               class="accent-red-500">
                                        <span class="text-xs text-on-surface">Inactivo</span>
                                    </label>
                                </div>
                            </td>
                        </tr>
                    </table>
                </fieldset>

            </div>

            <!-- Footer -->
            <div class="flex items-center gap-2 pt-3 mt-4 border-t border-outline-variant">

                <th:block th:fragment="~{fragments/components/UI/button :: btnSubmit}"></th:block>

                <a th:href="@{/employee}"
                   class="hover:bg-primary hover:text-white text-on-surface border border-outline-variant px-4 py-1 text-xs font-medium no-underline inline-block rounded-sm dark:hover:bg-slate-900 dark:hover:text-white">
                    Volver
                </a>
            </div>

        </form>
    </div>

    <div class="bg-primary/80 dark:bg-slate-900/90" style="height: 20px"></div>

</div>

<script th:src="@{/js/cuit-mask.js}"></script>
