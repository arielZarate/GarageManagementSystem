<div th:fragment="content" class="border border-outline-variant bg-surface-container rounded-md overflow-hidden">

    <!-- Header -->
    <div class="bg-surface-container px-4 py-2 border-b border-outline-variant flex items-center justify-between">
        <h1 class="text-sm font-bold text-on-surface">Empleados</h1>
        <th:block th:replace="~{fragments/components/UI/button :: btnNew(baseUrl='/employee/form')}" ></th:block>
    </div>

    <!-- Body -->
    <div class="p-4">

        <!-- Tabla -->
        <div class="border border-outline-variant overflow-x-auto">
            <table class="w-full text-xs text-on-surface">
                <thead>
                    <tr class="bg-surface-container-low text-on-surface/60 uppercase font-semibold">
                        <th class="px-3 py-2 text-left border-b border-outline-variant">Legajo</th>
                        <th class="px-3 py-2 text-left border-b border-outline-variant">Nombre</th>
                        <th class="px-3 py-2 text-left border-b border-outline-variant">CUIT</th>
                        <th class="px-3 py-2 text-left border-b border-outline-variant">Email</th>
                        <th class="px-3 py-2 text-left border-b border-outline-variant">Teléfono</th>
                        <th class="px-3 py-2 text-left border-b border-outline-variant">Role</th>
                        <th class="px-3 py-2 text-center border-b border-outline-variant">Estado</th>
                        <th class="px-3 py-2 text-center border-b border-outline-variant">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="employee: ${employees}"
                        class="hover:bg-surface-container-low even:bg-surface-container-low/50 border-b border-outline-variant">
                        <td class="px-3 py-2 font-medium text-on-surface" th:text="${employee.legajo}"></td>
                        <td class="px-3 py-2" th:text="${employee.firstName} + ' ' + ${employee.lastName}"></td>
                        <td class="px-3 py-2">
                            <th:block th:replace="~{fragments/components/UI/list-input :: copyButton(value=${employee.CUIT}, title='Copiar CUIT')}"></th:block>
                        </td>
                        <td class="px-3 py-2">
                            <th:block th:replace="~{fragments/components/UI/list-input :: copyButton(value=${employee.email}, title='Copiar email')}"></th:block>
                        </td>
                        <td class="px-3 py-2">
                            <th:block th:replace="~{fragments/components/UI/list-input :: copyButton(value=${employee.phone}, title='Copiar teléfono')}"></th:block>
                        </td>
                        <td class="px-3 py-2">
                            <span class="bg-secondary-container text-on-secondary-container text-xs font-medium px-2 py-1 rounded" th:text="${employee.role.displayName}"></span>
                        </td>
                        <th:block th:replace="~{fragments/components/UI/list-input :: status(field='employee.active')}" ></th:block>
                        <th:block th:replace="~{fragments/components/UI/list-input :: actions(baseUrl='/employee', id=${employee.id})}"></th:block>
                    </tr>
                    <!-- Fila vacía -->
                    <tr th:if="${#lists.isEmpty(employees)}">
                        <td colspan="8" class="px-3 py-12 text-center text-on-surface/40">
                            <p class="text-sm mb-1">No hay empleados registrados</p>
                            <p class="text-xs">Creá el primer empleado</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
