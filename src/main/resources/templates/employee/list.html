<div th:fragment="content" class="border border-outline-variant bg-surface-container rounded-md overflow-hidden">

    <!-- Header -->
    <div class="bg-primary/80 dark:bg-slate-900/90 px-4 py-2 border-b border-outline-variant flex items-center justify-between">
        <h1 class="text-sm font-bold text-white">Empleados</h1>
        <a th:href="@{/employee/form}"
           class="bg-primary text-on-primary border border-outline-variant px-2 py-1 rounded-sm no-underline inline-block hover:bg-primary/80">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke-width="2"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v8m-4-4h8"/>
            </svg>
        </a>
    </div>

    <!-- Body -->
    <div class="p-4">

        <!-- Tabla -->
        <div class="border border-outline-variant overflow-x-auto">
            <table class="w-full text-xs text-on-surface">
                <thead>
                    <tr class="bg-surface-container-low text-on-surface/60 uppercase font-semibold">
                        <th class="px-3 py-2 text-left border-b border-outline-variant">Legajo</th>
                        <th class="px-3 py-2 text-left border-b border-outline-variant">Nombre</th>
                        <th class="px-3 py-2 text-left border-b border-outline-variant">CUIT</th>
                        <th class="px-3 py-2 text-left border-b border-outline-variant">Email</th>
                        <th class="px-3 py-2 text-left border-b border-outline-variant">Teléfono</th>
                        <th class="px-3 py-2 text-left border-b border-outline-variant">Role</th>
                        <th class="px-3 py-2 text-center border-b border-outline-variant">Estado</th>
                        <th class="px-3 py-2 text-center border-b border-outline-variant">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="employee: ${employees}"
                        class="hover:bg-surface-container-low even:bg-surface-container-low/50 border-b border-outline-variant">
                        <td class="px-3 py-2 font-medium text-on-surface" th:text="${employee.legajo}"></td>
                        <td class="px-3 py-2" th:text="${employee.firstName} + ' ' + ${employee.lastName}"></td>
                        <td class="px-3 py-2 font-mono">
                            <span class="inline-flex items-center gap-1 relative group">
                                <span th:text="${employee.CUIT}"></span>
                                <button class="inline-flex items-center justify-center p-0.5 border-0 bg-transparent text-on-surface/40 cursor-pointer opacity-0 group-hover:opacity-100 hover:text-primary" th:data-copy="${employee.CUIT}" title="Copiar CUIT">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                    </svg>
                                </button>
                                <span class="absolute bottom-full left-1/2 -translate-x-1/2 scale-90 bg-inverse-surface text-inverse-on-surface text-[0.625rem] px-2 py-0.5 whitespace-nowrap opacity-0 pointer-events-none transition-all">Copiado</span>
                            </span>
                        </td>
                        <td class="px-3 py-2">
                            <span class="inline-flex items-center gap-1 relative group">
                                <span th:text="${employee.email}"></span>
                                <button class="inline-flex items-center justify-center p-0.5 border-0 bg-transparent text-on-surface/40 cursor-pointer opacity-0 group-hover:opacity-100 hover:text-primary" th:data-copy="${employee.email}" title="Copiar email">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                    </svg>
                                </button>
                                <span class="absolute bottom-full left-1/2 -translate-x-1/2 scale-90 bg-inverse-surface text-inverse-on-surface text-[0.625rem] px-2 py-0.5 whitespace-nowrap opacity-0 pointer-events-none transition-all">Copiado</span>
                            </span>
                        </td>
                        <td class="px-3 py-2" th:text="${employee.phone}"></td>
                        <td class="px-3 py-2">
                            <span class="bg-secondary-container text-on-secondary-container text-xs font-medium px-2 py-1 rounded" th:text="${employee.role.displayName}"></span>
                        </td>
                        <td class="px-3 py-2 text-center">
                            <span th:if="${employee.active}"
                                  class="inline-flex items-center gap-1 bg-green-100 text-green-700 text-xs font-medium px-2 py-1 rounded-full">
                                <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                                Activo
                            </span>
                            <span th:unless="${employee.active}"
                                  class="inline-flex items-center gap-1 bg-red-100 text-red-700 text-xs font-medium px-2 py-1 rounded-full">
                                <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                                Inactivo
                            </span>
                        </td>
                        <td class="px-3 py-2 text-center">
                            <div class="flex items-center justify-center gap-1">
                                <a th:href="@{/employee/detail/{id}(id=${employee.id})}"
                                   class="p-1.5 rounded hover:bg-primary-container text-primary transition" title="Ver detalle">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    </svg>
                                </a>
                                <a th:href="@{/employee/edit/{id}(id=${employee.id})}"
                                   class="p-1.5 rounded hover:bg-secondary-container text-secondary transition" title="Editar">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <!-- Fila vacía -->
                    <tr th:if="${#lists.isEmpty(employees)}">
                        <td colspan="8" class="px-3 py-12 text-center text-on-surface/40">
                            <p class="text-sm mb-1">No hay empleados registrados</p>
                            <p class="text-xs">Creá el primer empleado</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('[data-copy]');
        if (!btn) return;

        var text = btn.getAttribute('data-copy');
        if (!text) return;

        navigator.clipboard.writeText(text).then(function() {
            var tooltip = btn.parentElement.querySelector('.scale-90');
            if (!tooltip) return;

            tooltip.classList.remove('scale-90', 'opacity-0');
            tooltip.classList.add('scale-100', 'opacity-100');
            setTimeout(function() {
                tooltip.classList.remove('scale-100', 'opacity-100');
                tooltip.classList.add('scale-90', 'opacity-0');
            }, 1200);
        }).catch(function() {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        });
    });
</script>
