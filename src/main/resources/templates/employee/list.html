<div th:fragment="content">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-on-surface">Empleados</h1>
        <a th:href="@{/employee/form}"
           class="bg-primary hover:bg-primary/90 text-on-primary px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 hover:scale-[1.02] active:scale-[0.98]">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Nuevo Empleado
        </a>
    </div>

    <!-- Tabla responsive -->
    <div class="bg-surface-container rounded-lg shadow border border-outline-variant overflow-x-auto">
        <table class="w-full text-sm text-on-surface">
            <thead>
                <tr class="bg-surface-container-low text-on-surface/60 uppercase text-xs font-semibold tracking-wider">
                    <th class="px-3 py-3 text-left">Legajo</th>
                    <th class="px-3 py-3 text-left">Nombre</th>
                    <th class="px-3 py-3 text-left">CUIT</th>
                    <th class="px-3 py-3 text-left">Email</th>
                    <th class="px-3 py-3 text-left">Teléfono</th>
                    <th class="px-3 py-3 text-left">Role</th>
                    <th class="px-3 py-3 text-center">Estado</th>
                    <th class="px-3 py-3 text-center">Acciones</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-outline-variant">
                <tr th:each="employee: ${employees}"
                    class="hover:bg-surface-container-low transition even:bg-surface-container-low/50">
                    <td class="px-3 py-3 font-medium text-on-surface" th:text="${employee.legajo}"></td>
                    <td class="px-3 py-3" th:text="${employee.firstName} + ' ' + ${employee.lastName}"></td>
                    <td class="px-3 py-3 font-mono text-xs">
                        <span class="inline-flex items-center gap-0.5 relative group">
                            <span th:text="${employee.CUIT}"></span>
                            <button class="inline-flex items-center justify-center p-0.5 border-0 bg-transparent text-slate-400 rounded cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity duration-150 hover:text-indigo-500 hover:bg-indigo-50" th:data-copy="${employee.CUIT}" title="Copiar CUIT">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                            </button>
                            <span class="absolute bottom-full left-1/2 -translate-x-1/2 scale-90 bg-slate-800 text-slate-50 text-[0.625rem] px-2 py-0.5 rounded whitespace-nowrap opacity-0 pointer-events-none transition-all duration-150">Copiado</span>
                        </span>
                    </td>
                    <td class="px-3 py-3">
                        <span class="inline-flex items-center gap-0.5 relative group">
                            <span th:text="${employee.email}"></span>
                            <button class="inline-flex items-center justify-center p-0.5 border-0 bg-transparent text-slate-400 rounded cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity duration-150 hover:text-indigo-500 hover:bg-indigo-50" th:data-copy="${employee.email}" title="Copiar email">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                            </button>
                            <span class="absolute bottom-full left-1/2 -translate-x-1/2 scale-90 bg-slate-800 text-slate-50 text-[0.625rem] px-2 py-0.5 rounded whitespace-nowrap opacity-0 pointer-events-none transition-all duration-150">Copiado</span>
                        </span>
                    </td>
                    <td class="px-3 py-3" th:text="${employee.phone}"></td>
                    <td class="px-3 py-3">
                        <span class="bg-secondary-container text-on-secondary-container text-xs font-medium px-2 py-1 rounded" th:text="${employee.role.displayName}"></span>
                    </td>
                    <td class="px-3 py-3 text-center">
                        <span th:if="${employee.active}"
                              class="inline-flex items-center gap-1 bg-green-100 text-green-700 text-xs font-medium px-2 py-1 rounded-full">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                            Activo
                        </span>
                        <span th:unless="${employee.active}"
                              class="inline-flex items-center gap-1 bg-red-100 text-red-700 text-xs font-medium px-2 py-1 rounded-full">
                            <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                            Inactivo
                        </span>
                    </td>
                    <td class="px-3 py-3">
                        <div class="flex items-center justify-center gap-1">
                            <!-- Ver detalle -->
                            <a th:href="@{/employee/detail/{id}(id=${employee.id})}"
                               class="p-1.5 rounded hover:bg-primary-container text-primary transition"
                               title="Ver detalle">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </a>
                            <!-- Editar -->
                            <a th:href="@{/employee/edit/{id}(id=${employee.id})}"
                               class="p-1.5 rounded hover:bg-secondary-container text-secondary transition"
                               title="Editar">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                </svg>
                            </a>

                        </div>
                    </td>
                </tr>
                <!-- Fila vacía -->
                <tr th:if="${#lists.isEmpty(employees)}">
                    <td colspan="8" class="px-3 py-12 text-center text-on-surface/40">
                        <p class="text-lg mb-1">No hay empleados registrados</p>
                        <p class="text-sm">Creá el primer empleado</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script th:src="@{/js/cuit-mask.js}"></script>
