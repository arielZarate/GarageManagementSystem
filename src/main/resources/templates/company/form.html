<div th:fragment="content">
    <div class="flex items-center justify-between mb-4">
        <div>
            <h1 class="text-xl font-bold text-on-surface" th:text="${editMode} ? 'Editar Empresa' : 'Nueva Empresa'"></h1>
            <p class="text-xs text-on-surface/60" th:text="${editMode} ? 'Modificá los datos de la empresa' : 'Completá los datos de la empresa'"></p>
        </div>
        <a th:href="${editMode} ? @{/company} : @{/}"
           class="text-on-surface/60 hover:text-on-surface p-1.5 rounded-lg hover:bg-surface-container-low transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </a>
    </div>

    <div class="bg-surface-container rounded-lg shadow border border-outline-variant p-4 md:p-5">
        <form th:action="${editMode} ? @{/company/update} : @{/company}"
              th:object="${companyObject}" method="post"
              class="space-y-4">

            <input type="hidden" th:field="*{id}" th:if="${editMode}">

            <!-- Errores globales -->
            <div th:if="${#fields.hasGlobalErrors()}"
                 class="bg-error-container border border-error-container text-on-error-container px-3 py-2 rounded-lg text-xs">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>

            <!-- Datos de la Empresa -->
            <div>
                <h2 class="text-sm font-semibold text-on-surface mb-2 pb-1 border-b border-outline-variant">Datos de la Empresa</h2>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">Nombre Fantasía</label>
                        <input type="text" th:field="*{businessName}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary"
                               th:classappend="${#fields.hasErrors('businessName')} ? 'border-error' : ''">
                        <span th:if="${#fields.hasErrors('businessName')}" th:errors="*{businessName}" class="text-error text-xs"></span>
                    </div>
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">Razón Social</label>
                        <input type="text" th:field="*{legalName}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary"
                               th:classappend="${#fields.hasErrors('legalName')} ? 'border-error' : ''">
                        <span th:if="${#fields.hasErrors('legalName')}" th:errors="*{legalName}" class="text-error text-xs"></span>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">CUIT</label>
                        <input type="text" th:field="*{cuit}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary"
                               th:classappend="${#fields.hasErrors('cuit')} ? 'border-error' : ''">
                        <span th:if="${#fields.hasErrors('cuit')}" th:errors="*{cuit}" class="text-error text-xs"></span>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">Teléfono</label>
                        <input type="text" th:field="*{phone}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary"
                               th:classappend="${#fields.hasErrors('phone')} ? 'border-error' : ''">
                        <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-error text-xs"></span>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">Email</label>
                        <input type="email" th:field="*{email}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary"
                               th:classappend="${#fields.hasErrors('email')} ? 'border-error' : ''">
                        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-error text-xs"></span>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">Horario</label>
                        <input type="text" th:field="*{horario}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">Logo URL</label>
                        <input type="text" th:field="*{logo}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary">
                    </div>
                </div>
            </div>

            <!-- Dirección -->
            <div>
                <h2 class="text-sm font-semibold text-on-surface mb-2 pb-1 border-b border-outline-variant">Dirección</h2>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">Provincia</label>
                        <input type="text" th:field="*{address.province}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary"
                               th:classappend="${#fields.hasErrors('address.province')} ? 'border-error' : ''">
                        <span th:if="${#fields.hasErrors('address.province')}" th:errors="*{address.province}" class="text-error text-xs"></span>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">Ciudad</label>
                        <input type="text" th:field="*{address.city}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary"
                               th:classappend="${#fields.hasErrors('address.city')} ? 'border-error' : ''">
                        <span th:if="${#fields.hasErrors('address.city')}" th:errors="*{address.city}" class="text-error text-xs"></span>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">Barrio</label>
                        <input type="text" th:field="*{address.neighborhood}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">Calle</label>
                        <input type="text" th:field="*{address.street}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary"
                               th:classappend="${#fields.hasErrors('address.street')} ? 'border-error' : ''">
                        <span th:if="${#fields.hasErrors('address.street')}" th:errors="*{address.street}" class="text-error text-xs"></span>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">Número</label>
                        <input type="text" th:field="*{address.number}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">C.P.</label>
                        <input type="text" th:field="*{address.postalCode}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-on-surface/60 mb-0.5">País</label>
                        <input type="text" th:field="*{address.country}"
                               class="w-full border border-outline rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary">
                    </div>
                </div>
            </div>

            <!-- Botones -->
            <div class="flex items-center gap-2 pt-3 border-t border-outline-variant">
                <button type="submit"
                        class="bg-primary hover:bg-primary/90 text-on-primary font-medium px-5 py-1.5 rounded-lg text-sm transition flex items-center gap-1.5 hover:scale-[1.02] active:scale-[0.98]">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    <span th:text="${editMode} ? 'Actualizar' : 'Guardar'"></span>
                </button>
                <a th:href="${editMode} ? @{/company} : @{/}"
                   class="text-on-surface/60 hover:text-on-surface font-medium px-4 py-1.5 rounded-lg text-sm transition border border-outline hover:bg-surface-container hover:border-on-surface/20">
                    Cancelar
                </a>
            </div>

        </form>
    </div>
</div>
