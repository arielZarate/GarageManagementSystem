<div th:fragment="content" class="border border-outline-variant bg-surface-container rounded-md overflow-hidden">

    <!-- Header -->
    <div class="bg-primary/80 dark:bg-slate-900/90 px-4 py-2 border-b border-outline-variant">
        <h1 class="text-sm font-bold text-white" th:text="${editMode} ? 'Editar Empresa' : 'Nueva Empresa'"></h1>
    </div>

    <!-- Body -->
    <div class="p-4">
        <form th:action="${editMode} ? @{/company/update} : @{/company}"
              th:object="${companyObject}" method="post">

            <input type="hidden" th:field="*{id}" th:if="${editMode}">

            <!-- Errores globales -->
            <div th:if="${#fields.hasGlobalErrors()}"
                 class="bg-error-container border border-error-container text-on-error-container px-3 py-2 mb-3 text-xs">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>

            <div class="flex flex-wrap gap-3 items-start">

                <!-- Datos de la Empresa -->
                <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                    <legend class="text-xs font-semibold text-on-surface px-1">Datos de la Empresa</legend>
                    <table class="w-full">
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Nombre Fantasía', field='businessName', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Razón Social', field='legalName', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInputCuit}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Teléfono', field='phone', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Email', field='email', type='email')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Horario', field='horario', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Logo URL', field='logo', type='text')}"></th:block>
                    </table>
                </fieldset>

                <!-- Dirección -->
                <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                    <legend class="text-xs font-semibold text-on-surface px-1">Dirección</legend>
                    <table class="w-full">
                        <th:block th:replace="~{fragments/components/UI/form-input :: formSelect(label='Provincia', field='address.province', listExpr='provinces', valueExpr='displayName', textExpr='displayName', emptyOption=false)}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Ciudad', field='address.city', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Barrio', field='address.neighborhood', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Calle', field='address.street', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='Número', field='address.number', type='text')}"></th:block>
                        <th:block th:replace="~{fragments/components/UI/form-input :: formInput(label='C.P.', field='address.postalCode', type='text')}"></th:block>
                        <tr>
                            <td class="w-24 py-1 pr-2">
                                <label class="text-xs text-on-surface/60">País</label>
                            </td>
                            <td class="py-1">
                                <input type="text" th:field="*{address.country}"
                                       class="w-full border border-outline-variant bg-surface-container-low/50 text-on-surface/60 px-2 py-1 text-xs cursor-not-allowed select-none outline-none"
                                       readonly unselectable="on" tabindex="-1">
                            </td>
                        </tr>
                    </table>
                </fieldset>

            </div>

            <!-- Footer -->
            <div class="flex items-center gap-2 pt-3 mt-4 border-t border-outline-variant">
                <th:block th:replace="~{fragments/components/UI/button :: btnSubmit}"></th:block>
                <th:block th:replace="~{fragments/components/UI/button :: btnBack(url=${editMode} ? '/company' : '/')}"></th:block>
            </div>

        </form>
    </div>

    <div class="bg-primary/80 dark:bg-slate-900/90" style="height: 20px"></div>

</div>
