<div th:fragment="content" class="border border-outline-variant bg-surface-container rounded-md overflow-hidden">

    <!-- Header -->
    <div class="bg-primary/80 dark:bg-slate-900/90 px-4 py-2 border-b border-outline-variant">
        <h1 class="text-sm font-bold text-white">Compañía</h1>
    </div>

    <!-- Body -->
    <div class="p-4">

        <div th:if="${company == null}" class="text-center py-8">
            <p class="text-on-surface/60 mb-4 text-sm">No hay compañía registrada.</p>
            <a th:href="@{/company/new}"
               class="hover:bg-primary hover:text-white text-on-surface border border-outline-variant px-4 py-1 text-xs font-medium no-underline inline-block rounded-sm dark:hover:bg-slate-900 dark:hover:text-white">
                Crear Compañía
            </a>
        </div>

        <div th:if="${company != null}" class="flex flex-wrap gap-3">

            <!-- Datos de la Empresa -->
            <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                <legend class="text-xs font-semibold text-on-surface px-1">Datos de la Empresa</legend>
                <table class="w-full text-xs">
                    <th:block th:replace="~{fragments/components/UI/detail-row :: detailRow(label='Nombre Fantasía', value=${company.businessName})}"></th:block>
                    <th:block th:replace="~{fragments/components/UI/detail-row :: detailRow(label='Razón Social', value=${company.legalName})}"></th:block>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">CUIT</td>
                        <td class="text-on-surface font-mono py-1 text-xs">
                            <th:block th:replace="~{fragments/components/UI/list-input :: copyButton(value=${company.cuit}, title='Copiar CUIT')}"></th:block>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Teléfono</td>
                        <td class="text-on-surface py-1">
                            <th:block th:replace="~{fragments/components/UI/list-input :: copyButton(value=${company.phone}, title='Copiar teléfono')}"></th:block>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Email</td>
                        <td class="text-on-surface py-1">
                            <th:block th:replace="~{fragments/components/UI/list-input :: copyButton(value=${company.email}, title='Copiar email')}"></th:block>
                        </td>
                    </tr>
                    <th:block th:replace="~{fragments/components/UI/detail-row :: detailRow(label='Horario', value=${company.horario})}"></th:block>
                    <tr th:if="${company.logo}">
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Logo</td>
                        <td class="text-on-surface py-1 text-xs truncate max-w-[200px]" th:text="${company.logo}"></td>
                    </tr>
                </table>
            </fieldset>

            <!-- Dirección -->
            <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                <legend class="text-xs font-semibold text-on-surface px-1">Dirección</legend>
                <table class="w-full text-xs">
                    <th:block th:replace="~{fragments/components/UI/detail-row :: detailRow(label='Provincia', value=${company.address?.province ?: '-'})}"></th:block>
                    <th:block th:replace="~{fragments/components/UI/detail-row :: detailRow(label='Ciudad', value=${company.address?.city ?: '-'})}"></th:block>
                    <th:block th:replace="~{fragments/components/UI/detail-row :: detailRow(label='Barrio', value=${company.address?.neighborhood ?: '-'})}"></th:block>
                    <th:block th:replace="~{fragments/components/UI/detail-row :: detailRow(label='Calle', value=|${company.address?.street ?: '-'} ${company.address?.number ?: ''}|)}"></th:block>
                    <th:block th:replace="~{fragments/components/UI/detail-row :: detailRow(label='C.P.', value=${company.address?.postalCode ?: '-'})}"></th:block>
                    <th:block th:replace="~{fragments/components/UI/detail-row :: detailRow(label='País', value=${company.address?.country ?: '-'})}"></th:block>
                </table>
            </fieldset>

        </div>

    </div>

    <!-- Footer -->
    <div class="px-4 pt-3 pb-6 border-t border-outline-variant flex items-center justify-between">
        <div class="flex items-center gap-2">
            <a th:href="@{/company/edit}"
               class="hover:bg-primary hover:text-white text-on-surface border border-outline-variant px-4 py-1 text-xs font-medium no-underline inline-block rounded-sm dark:hover:bg-slate-900 dark:hover:text-white">
                <span class="flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                    Editar
                </span>
            </a>
            <th:block th:replace="~{fragments/components/UI/button :: btnDelete(actionUrl='/company/delete', msg='¿Eliminar la compañía?')}"></th:block>
            <th:block th:replace="~{fragments/components/UI/button :: btnBack(url='/')}"></th:block>
        </div>
    </div>
    <div class="bg-primary/80 dark:bg-slate-900/90" style="height: 20px"></div>

</div>
