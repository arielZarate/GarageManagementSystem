<div th:fragment="content" class="border border-outline-variant bg-surface-container rounded-md overflow-hidden">

    <!-- Header -->
    <div class="bg-primary/80 dark:bg-slate-900/90 px-4 py-2 border-b border-outline-variant">
        <h1 class="text-sm font-bold text-white">Compañía</h1>
    </div>

    <!-- Body -->
    <div class="p-4">

        <div th:if="${company == null}" class="text-center py-8">
            <p class="text-on-surface/60 mb-4 text-sm">No hay compañía registrada.</p>
            <a th:href="@{/company/new}"
               class="hover:bg-primary hover:text-white text-on-surface border border-outline-variant px-4 py-1 text-xs font-medium no-underline inline-block rounded-sm dark:hover:bg-slate-900 dark:hover:text-white">
                Crear Compañía
            </a>
        </div>

        <div th:if="${company != null}" class="flex flex-wrap gap-4">

            <!-- Datos de la Empresa -->
            <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                <legend class="text-xs font-semibold text-on-surface px-1">Datos de la Empresa</legend>
                <table class="w-full text-xs">
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap w-1/3">Nombre Fantasía</td>
                        <td class="text-on-surface font-medium py-1" th:text="${company.businessName}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Razón Social</td>
                        <td class="text-on-surface py-1" th:text="${company.legalName}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">CUIT</td>
                        <td class="text-on-surface font-mono py-1 text-xs" th:text="${company.cuit}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Teléfono</td>
                        <td class="text-on-surface py-1" th:text="${company.phone}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Email</td>
                        <td class="text-on-surface py-1" th:text="${company.email}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Horario</td>
                        <td class="text-on-surface py-1" th:text="${company.horario}"></td>
                    </tr>
                    <tr th:if="${company.logo}">
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Logo</td>
                        <td class="text-on-surface py-1 text-xs truncate max-w-[200px]" th:text="${company.logo}"></td>
                    </tr>
                </table>
            </fieldset>

            <!-- Dirección -->
            <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                <legend class="text-xs font-semibold text-on-surface px-1">Dirección</legend>
                <table class="w-full text-xs">
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap w-1/3">Provincia</td>
                        <td class="text-on-surface py-1" th:text="${company.address?.province ?: '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Ciudad</td>
                        <td class="text-on-surface py-1" th:text="${company.address?.city ?: '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Barrio</td>
                        <td class="text-on-surface py-1" th:text="${company.address?.neighborhood ?: '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Calle</td>
                        <td class="text-on-surface py-1" th:text="|${company.address?.street ?: '-'} ${company.address?.number ?: ''}|"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">C.P.</td>
                        <td class="text-on-surface py-1" th:text="${company.address?.postalCode ?: '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">País</td>
                        <td class="text-on-surface py-1" th:text="${company.address?.country ?: '-'}"></td>
                    </tr>
                </table>
            </fieldset>

        </div>

    </div>

    <!-- Footer -->
    <div class="px-4 pt-3 pb-6 border-t border-outline-variant flex items-center justify-between">
        <div class="flex items-center gap-2">
            <a th:href="@{/company/edit}"
               class="hover:bg-primary hover:text-white text-on-surface border border-outline-variant px-4 py-1 text-xs font-medium no-underline inline-block rounded-sm dark:hover:bg-slate-900 dark:hover:text-white">
                <span class="flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                    Editar
                </span>
            </a>
            <form th:action="@{/company/delete}" method="post" class="inline">
                <button type="submit"
                        class="hover:bg-error hover:text-white text-error border border-error px-2 py-1 text-xs font-medium rounded-sm dark:hover:bg-slate-900 dark:hover:text-white"
                        onclick="return confirm('¿Eliminar la compañía?')">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </button>
            </form>
            <a th:href="@{/}"
               class="hover:bg-primary hover:text-white text-on-surface border border-outline-variant px-4 py-1 text-xs font-medium no-underline inline-block rounded-sm dark:hover:bg-slate-900 dark:hover:text-white">
                Volver
            </a>
        </div>
    </div>
    <div class="bg-primary/80 dark:bg-slate-900/90" style="height: 20px"></div>

</div>
