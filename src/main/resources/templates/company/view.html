<div th:fragment="content">
    <div class="flex items-center justify-between mb-4">
        <div>
            <h1 class="text-xl font-bold text-gray-800">Compañía</h1>
            <p class="text-xs text-gray-500">Datos del taller</p>
        </div>
        <a th:href="@{/}"
           class="text-gray-500 hover:text-gray-700 p-1.5 rounded-lg hover:bg-gray-100 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </a>
    </div>

    <div th:if="${company == null}" class="bg-white rounded-lg shadow border border-gray-200 p-12 text-center">
        <p class="text-gray-500 mb-4">No hay compañía registrada.</p>
        <a th:href="@{/company/new}"
           class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm transition">
            Crear Compañía
        </a>
    </div>

    <div th:if="${company != null}" class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <!-- Datos de la Empresa -->
        <div class="bg-white rounded-lg shadow border border-gray-200 p-4">
            <h2 class="text-sm font-semibold text-gray-700 mb-3 pb-1 border-b border-gray-200">Datos de la Empresa</h2>
            <dl class="space-y-2 text-sm">
                <div class="flex justify-between">
                    <dt class="text-gray-500">Nombre Fantasía</dt>
                    <dd class="text-gray-800 font-medium" th:text="${company.businessName}"></dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-gray-500">Razón Social</dt>
                    <dd class="text-gray-800" th:text="${company.legalName}"></dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-gray-500">CUIT</dt>
                    <dd class="text-gray-800 font-mono text-xs" th:text="${company.cuit}"></dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-gray-500">Teléfono</dt>
                    <dd class="text-gray-800" th:text="${company.phone}"></dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-gray-500">Email</dt>
                    <dd class="text-gray-800" th:text="${company.email}"></dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-gray-500">Horario</dt>
                    <dd class="text-gray-800" th:text="${company.horario}"></dd>
                </div>
                <div class="flex justify-between" th:if="${company.logo}">
                    <dt class="text-gray-500">Logo</dt>
                    <dd class="text-gray-800 text-xs text-right truncate max-w-[200px]" th:text="${company.logo}"></dd>
                </div>
            </dl>
        </div>

        <!-- Dirección -->
        <div class="bg-white rounded-lg shadow border border-gray-200 p-4">
            <h2 class="text-sm font-semibold text-gray-700 mb-3 pb-1 border-b border-gray-200">Dirección</h2>
            <dl class="space-y-2 text-sm">
                <div class="flex justify-between">
                    <dt class="text-gray-500">Provincia</dt>
                    <dd class="text-gray-800" th:text="${company.address?.province ?: '-'}"></dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-gray-500">Ciudad</dt>
                    <dd class="text-gray-800" th:text="${company.address?.city ?: '-'}"></dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-gray-500">Barrio</dt>
                    <dd class="text-gray-800" th:text="${company.address?.neighborhood ?: '-'}"></dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-gray-500">Calle</dt>
                    <dd class="text-gray-800" th:text="|${company.address?.street ?: '-'} ${company.address?.number ?: ''}|"></dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-gray-500">Código Postal</dt>
                    <dd class="text-gray-800" th:text="${company.address?.postalCode ?: '-'}"></dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-gray-500">País</dt>
                    <dd class="text-gray-800" th:text="${company.address?.country ?: '-'}"></dd>
                </div>
            </dl>
        </div>

    </div>

    <!-- Botones -->
    <div class="flex items-center gap-2 mt-4">
        <a th:href="@{/company/edit}"
           class="border border-slate-300 hover:bg-slate-100 text-slate-700 px-4 py-1.5 rounded-lg text-sm font-medium transition flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
            Editar
        </a>
        <form th:action="@{/company/delete}" method="post" class="inline">
            <button type="submit"
                    class="p-2 rounded-lg hover:bg-red-100 text-red-500 transition"
                    title="Eliminar compañía"
                    onclick="return confirm('¿Eliminar la compañía?')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </button>
        </form>
        <a th:href="@{/}"
           class="text-gray-600 hover:text-gray-800 font-medium px-4 py-1.5 rounded-lg text-sm transition border border-gray-300 hover:bg-gray-50 ml-auto">
            Volver
        </a>
    </div>
</div>
