<div th:fragment="content" class="border border-outline-variant bg-surface-container rounded-md overflow-hidden">

    <!-- Header -->
    <div class="bg-surface-container px-4 py-2 border-b border-outline-variant flex items-center justify-between">
        <h1 class="text-sm font-bold text-on-surface">Clientes</h1>
        <th:block th:replace="~{fragments/components/UI/button :: btnNew(baseUrl='/customer/form')}"></th:block>

    </div>

    <!-- Body -->
    <div class="p-4">

        <!-- Buscador -->
        <th:block
                th:replace="~{fragments/components/search :: searchInput(baseUrl='/customer', placeholder='Buscar por DNI o CUIT...', query='searchQuery')}"></th:block>

        <!-- Tabla -->
        <div class="border border-outline-variant overflow-x-auto">
            <table class="w-full text-xs text-on-surface">
                <thead>
                <tr class="bg-surface-container-low text-on-surface/60 uppercase font-semibold">
                    <th class="px-3 py-2 text-left border-b border-outline-variant">Código</th>
                    <th class="px-3 py-2 text-left border-b border-outline-variant">Nombre</th>
                    <th class="px-3 py-2 text-left border-b border-outline-variant">DNI</th>
                    <th class="px-3 py-2 text-left border-b border-outline-variant">Email</th>
                    <th class="px-3 py-2 text-left border-b border-outline-variant">Teléfono</th>
                    <th class="px-3 py-2 text-center border-b border-outline-variant">Estado</th>
                    <th class="px-3 py-2 text-center border-b border-outline-variant">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c: ${customers}"
                    class="hover:bg-surface-container-low even:bg-surface-container-low/50 border-b border-outline-variant">
                    <td class="px-3 py-2 font-mono" th:text="${c.customerCode}"></td>
                    <td class="px-3 py-2" th:text="${c.firstName} + ' ' + ${c.lastName}"></td>
                    <th:block
                            th:replace="~{fragments/components/UI/list-input :: copyCell(value=${c.dni}, title='Copiar DNI')}"></th:block>
                    <th:block
                            th:replace="~{fragments/components/UI/list-input :: copyCell(value=${c.email}, title='Copiar email')}"></th:block>
                    <td class="px-3 py-2" th:text="${c.phone}"></td>

                    <th:block th:replace="~{fragments/components/UI/list-input :: status(field='c.active')}"></th:block>

                    <th:block
                            th:replace="~{fragments/components/UI/list-input :: actions(baseUrl='/customer', id=${c.id})}"></th:block>
                </tr>
                <!-- Fila vacía -->
                <tr th:if="${#lists.isEmpty(customers)}">
                    <td colspan="7" class="px-3 py-12 text-center text-on-surface/40">
                        <p class="text-sm mb-1">No hay clientes registrados</p>
                        <p class="text-xs">Creá el primer cliente</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
