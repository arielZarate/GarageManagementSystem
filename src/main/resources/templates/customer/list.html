<div th:fragment="content">
    <div class="flex justify-between items-center mb-4">
        <div>
            <h1 class="text-xl font-bold text-on-surface">Clientes</h1>
            <p class="text-xs text-on-surface/60">Listado de clientes registrados</p>
        </div>
        <a th:href="@{/customer/form}"
           class="bg-primary hover:bg-primary/90 text-on-primary px-4 py-1.5 rounded-lg text-sm font-medium transition flex items-center gap-1.5 hover:scale-[1.02] active:scale-[0.98]">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Nuevo Cliente
        </a>
    </div>

    <!-- Buscador -->
    <div class="mb-4">
        <form th:action="@{/customer}" method="get" class="flex gap-2">
            <div class="relative flex-1 max-w-xs">
                <svg class="w-4 h-4 text-on-surface/40 absolute left-2.5 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="text" name="q" th:value="${searchQuery}"
                       placeholder="Buscar por DNI o CUIT..."
                       class="w-full bg-surface-container-low text-on-surface placeholder:text-on-surface/40 border border-outline rounded-lg pl-8 pr-3 py-1.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary">
            </div>
            <button type="submit"
                    class="bg-surface-container-low hover:bg-surface-container text-on-surface px-3 py-1.5 rounded-lg text-sm font-medium transition border border-outline">
                Buscar
            </button>
            <a th:href="@{/customer}" th:if="${searchQuery != null}"
               class="text-on-surface/60 hover:text-on-surface px-3 py-1.5 rounded-lg text-sm transition border border-outline hover:bg-surface-container-low">
                Limpiar
            </a>
        </form>
    </div>

    <!-- Tabla responsive -->
    <div class="bg-surface-container rounded-lg shadow border border-outline-variant overflow-x-auto">
        <table class="w-full text-sm text-on-surface">
            <thead>
                <tr class="bg-surface-container-low text-on-surface/60 uppercase text-xs font-semibold tracking-wider">
                    <th class="px-3 py-3 text-left">Código</th>
                    <th class="px-3 py-3 text-left">Nombre</th>
                    <th class="px-3 py-3 text-left">DNI</th>
                    <th class="px-3 py-3 text-left">Email</th>
                    <th class="px-3 py-3 text-left">Teléfono</th>
                    <th class="px-3 py-3 text-center">Estado</th>
                    <th class="px-3 py-3 text-center">Acciones</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-outline-variant">
                <tr th:each="c: ${customers}"
                    class="hover:bg-surface-container-low transition even:bg-surface-container-low/50">
                    <td class="px-3 py-3 font-medium text-on-surface font-mono text-xs" th:text="${c.customerCode}"></td>
                    <td class="px-3 py-3" th:text="${c.firstName} + ' ' + ${c.lastName}"></td>
                    <td class="px-3 py-3">
                        <span class="inline-flex items-center gap-0.5 relative group">
                            <span th:text="${c.dni}"></span>

                            <!--tooltip-->
                            <button class="inline-flex items-center justify-center p-0.5 border-0 bg-transparent text-slate-400 rounded cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity duration-150 hover:text-indigo-500 hover:bg-indigo-50" th:data-copy="${c.dni}" title="Copiar DNI">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                            </button>

                            <span class="absolute bottom-full left-1/2 -translate-x-1/2 scale-90 bg-slate-800 text-slate-50 text-[0.625rem] px-2 py-0.5 rounded whitespace-nowrap opacity-0 pointer-events-none transition-all duration-150">Copiado</span>
                        </span>
                    </td>
                    <td class="px-3 py-3">
                        <span class="inline-flex items-center gap-0.5 relative group">
                            <span th:text="${c.email}"></span>

                            <!--tooltip-->
                            <button class="inline-flex items-center justify-center p-0.5 border-0 bg-transparent text-slate-400 rounded cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity duration-150 hover:text-indigo-500 hover:bg-indigo-50" th:data-copy="${c.email}" title="Copiar email">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                            </button>
                            <span class="absolute bottom-full left-1/2 -translate-x-1/2 scale-90 bg-slate-800 text-slate-50 text-[0.625rem] px-2 py-0.5 rounded whitespace-nowrap opacity-0 pointer-events-none transition-all duration-150">Copiado</span>

                        </span>
                    </td>
                    <td class="px-3 py-3" th:text="${c.phone}"></td>
                    <td class="px-3 py-3 text-center">
                        <span th:if="${c.active}"
                              class="inline-flex items-center gap-1 bg-green-100 text-green-700 text-xs font-medium px-2 py-1 rounded-full">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                            Activo
                        </span>
                        <span th:unless="${c.active}"
                              class="inline-flex items-center gap-1 bg-red-100 text-red-700 text-xs font-medium px-2 py-1 rounded-full">
                            <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                            Inactivo
                        </span>
                    </td>
                    <td class="px-3 py-3">
                        <div class="flex items-center justify-center gap-1">
                            <!-- Ver detalle -->
                            <a th:href="@{/customer/detail/{id}(id=${c.id})}"
                               class="p-1.5 rounded hover:bg-primary-container text-primary transition"
                               title="Ver detalle">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </a>
                            <!-- Editar -->
                            <a th:href="@{/customer/edit/{id}(id=${c.id})}"
                               class="p-1.5 rounded hover:bg-secondary-container text-secondary transition"
                               title="Editar">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                </svg>
                            </a>
                        </div>
                    </td>
                </tr>
                <!-- Fila vacía -->
                <tr th:if="${#lists.isEmpty(customers)}">
                    <td colspan="7" class="px-3 py-12 text-center text-on-surface/40">
                        <p class="text-lg mb-1">No hay clientes registrados</p>
                        <p class="text-sm">Creá el primer cliente</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('[data-copy]');
        if (!btn) return;

        var text = btn.getAttribute('data-copy');
        if (!text) return;

        navigator.clipboard.writeText(text).then(function() {
            var tooltip = btn.parentElement.querySelector('.scale-90');
            if (!tooltip) return;

            tooltip.classList.remove('scale-90', 'opacity-0');
            tooltip.classList.add('scale-100', 'opacity-100');
            setTimeout(function() {
                tooltip.classList.remove('scale-100', 'opacity-100');
                tooltip.classList.add('scale-90', 'opacity-0');
            }, 1200);
        }).catch(function() {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        });
    });
</script>
