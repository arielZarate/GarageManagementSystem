<div th:fragment="content">
    <div class="flex justify-between items-center mb-4">
        <div>
            <h1 class="text-xl font-bold text-gray-800">Clientes</h1>
            <p class="text-xs text-gray-500">Listado de clientes registrados</p>
        </div>
        <a th:href="@{/customer/form}"
           class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Nuevo Cliente
        </a>
    </div>

    <!-- Buscador -->
    <div class="mb-4">
        <form th:action="@{/customer}" method="get" class="flex gap-2">
            <div class="relative flex-1 max-w-xs">
                <svg class="w-4 h-4 text-gray-400 absolute left-2.5 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="text" name="q" th:value="${searchQuery}"
                       placeholder="Buscar por DNI o CUIT..."
                       class="w-full border border-gray-300 rounded-lg pl-8 pr-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit"
                    class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-sm font-medium transition border border-gray-300">
                Buscar
            </button>
            <a th:href="@{/customer}" th:if="${searchQuery != null}"
               class="text-gray-500 hover:text-gray-700 px-3 py-1.5 rounded-lg text-sm transition border border-gray-300 hover:bg-gray-50">
                Limpiar
            </a>
        </form>
    </div>

    <!-- Tabla responsive -->
    <div class="bg-white rounded-lg shadow border border-gray-200 overflow-x-auto">
        <table class="w-full text-sm text-gray-700">
            <thead>
                <tr class="bg-gray-100 text-gray-600 uppercase text-xs font-semibold tracking-wider">
                    <th class="px-3 py-3 text-left">Código</th>
                    <th class="px-3 py-3 text-left">Nombre</th>
                    <th class="px-3 py-3 text-left">DNI</th>
                    <th class="px-3 py-3 text-left">Email</th>
                    <th class="px-3 py-3 text-left">Teléfono</th>
                    <th class="px-3 py-3 text-center">Estado</th>
                    <th class="px-3 py-3 text-center">Acciones</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                <tr th:each="c: ${customers}"
                    class="hover:bg-gray-50 transition even:bg-gray-50/50">
                    <td class="px-3 py-3 font-medium text-gray-900 font-mono text-xs" th:text="${c.customerCode}"></td>
                    <td class="px-3 py-3" th:text="${c.firstName} + ' ' + ${c.lastName}"></td>
                    <td class="px-3 py-3" th:text="${c.dni}"></td>
                    <td class="px-3 py-3" th:text="${c.email}"></td>
                    <td class="px-3 py-3" th:text="${c.phone}"></td>
                    <td class="px-3 py-3 text-center">
                        <span th:if="${c.active}"
                              class="inline-flex items-center gap-1 bg-green-100 text-green-700 text-xs font-medium px-2 py-1 rounded-full">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                            Activo
                        </span>
                        <span th:unless="${c.active}"
                              class="inline-flex items-center gap-1 bg-red-100 text-red-700 text-xs font-medium px-2 py-1 rounded-full">
                            <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                            Inactivo
                        </span>
                    </td>
                    <td class="px-3 py-3">
                        <div class="flex items-center justify-center gap-1">
                            <!-- Ver detalle -->
                            <a th:href="@{/customer/detail/{id}(id=${c.id})}"
                               class="p-1.5 rounded hover:bg-blue-100 text-blue-600 transition"
                               title="Ver detalle">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </a>
                            <!-- Editar -->
                            <a th:href="@{/customer/edit/{id}(id=${c.id})}"
                               class="p-1.5 rounded hover:bg-slate-200 text-slate-600 transition"
                               title="Editar">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                </svg>
                            </a>
                        </div>
                    </td>
                </tr>
                <!-- Fila vacía -->
                <tr th:if="${#lists.isEmpty(customers)}">
                    <td colspan="7" class="px-3 py-12 text-center text-gray-400">
                        <p class="text-lg mb-1">No hay clientes registrados</p>
                        <p class="text-sm">Creá el primer cliente</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
