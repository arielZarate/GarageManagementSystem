<div th:fragment="content" class="border border-gray-300 bg-white rounded-md overflow-hidden">

    <!-- Header -->
    <div class="bg-primary/80 dark:bg-slate-900/90 px-4 py-2 border-b border-gray-300">
        <h1 class="text-sm font-bold text-white" th:text="${editMode} ? 'Editar Cliente' : 'Nuevo Cliente'"></h1>
    </div>

    <!-- Body -->
    <div class="p-4">
        <form id="customerForm" th:object="${customerObject}" method="post"
              th:action="${editMode} ? @{/customer/update} : @{/customer}">

            <input type="hidden" th:field="*{id}" th:if="${editMode}"/>

            <!-- Errores globales -->
            <div th:if="${#fields.hasGlobalErrors()}"
                 class="bg-red-50 border border-red-200 text-red-700 px-3 py-2 mb-3 text-xs">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>

            <div class="flex flex-wrap gap-3 items-start">
            <!-- Datos personales -->
            <fieldset class="border border-gray-300 px-3 pt-2 pb-1 min-w-[280px] flex-1">
                <legend class="text-xs font-semibold text-gray-700 px-1">Datos Personales</legend>
                <table class="w-full">
                    <tr th:if="${editMode}">
                        <td class="w-24 py-1 pr-2">
                            <label class="text-xs text-gray-600">Código</label>
                        </td>
                        <td class="py-1">
                            <input type="text" th:field="*{customerCode}"
                                   class="w-full border border-gray-300 bg-white px-2 py-1 text-xs font-mono focus:border-gray-500 focus:outline-none">
                        </td>
                    </tr>
                    <tr>
                        <td class="w-24 py-1 pr-2">
                            <label class="text-xs text-gray-600">Nombres</label>
                        </td>
                        <td class="py-1">
                            <input type="text" th:field="*{firstName}"
                                   class="w-full border border-gray-300 bg-white px-2 py-1 text-xs focus:border-gray-500 focus:outline-none"
                                   th:classappend="${#fields.hasErrors('firstName')} ? 'border-red-400' : ''">
                            <span th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="text-red-500 text-xs"></span>
                        </td>
                    </tr>
                    <tr>
                        <td class="w-24 py-1 pr-2">
                            <label class="text-xs text-gray-600">Apellido</label>
                        </td>
                        <td class="py-1">
                            <input type="text" th:field="*{lastName}"
                                   class="w-full border border-gray-300 bg-white px-2 py-1 text-xs focus:border-gray-500 focus:outline-none"
                                   th:classappend="${#fields.hasErrors('lastName')} ? 'border-red-400' : ''">
                            <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="text-red-500 text-xs"></span>
                        </td>
                    </tr>
                    <tr>
                        <td class="w-24 py-1 pr-2">
                            <label class="text-xs text-gray-600">DNI</label>
                        </td>
                        <td class="py-1">
                            <input type="text" th:field="*{dni}"
                                   class="w-full border border-gray-300 bg-white px-2 py-1 text-xs focus:border-gray-500 focus:outline-none"
                                   th:classappend="${#fields.hasErrors('dni')} ? 'border-red-400' : ''">
                            <span th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}" class="text-red-500 text-xs"></span>
                        </td>
                    </tr>
                    <tr>
                        <td class="w-24 py-1 pr-2">
                            <label class="text-xs text-gray-600">CUIT</label>
                        </td>
                        <td class="py-1">
                            <input type="text" th:field="*{cuit}" class="cuit-mask w-full border border-gray-300 bg-white px-2 py-1 text-xs focus:border-gray-500 focus:outline-none"
                                   th:classappend="${#fields.hasErrors('cuit')} ? 'border-red-400' : ''"
                                   placeholder="XX-XXXXXXXX-X" maxlength="13">
                            <span th:if="${#fields.hasErrors('cuit')}" th:errors="*{cuit}" class="text-red-500 text-xs"></span>
                        </td>
                    </tr>
                </table>
            </fieldset>

            <div class="flex flex-col gap-3 flex-1 min-w-[280px]">
                <!-- Contacto -->
                <fieldset class="border border-gray-300 px-3 pt-2 pb-1">
                    <legend class="text-xs font-semibold text-gray-700 px-1">Contacto</legend>
                    <table class="w-full">
                        <tr>
                            <td class="w-24 py-1 pr-2">
                                <label class="text-xs text-gray-600">Email</label>
                            </td>
                            <td class="py-1">
                                <input type="email" th:field="*{email}"
                                       class="w-full border border-gray-300 bg-white px-2 py-1 text-xs focus:border-gray-500 focus:outline-none"
                                       th:classappend="${#fields.hasErrors('email')} ? 'border-red-400' : ''">
                                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-500 text-xs"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="w-24 py-1 pr-2">
                                <label class="text-xs text-gray-600">Teléfono</label>
                            </td>
                            <td class="py-1">
                                <input type="text" th:field="*{phone}"
                                       class="w-full border border-gray-300 bg-white px-2 py-1 text-xs focus:border-gray-500 focus:outline-none"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'border-red-400' : ''">
                                <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-red-500 text-xs"></span>
                            </td>
                        </tr>
                    </table>
                </fieldset>

                <!-- Estado -->
                <fieldset th:if="${editMode}" class="border border-gray-300 px-3 pt-2 pb-1">
                    <legend class="text-xs font-semibold text-gray-700 px-1">Estado</legend>
                    <table class="w-full">
                        <tr>
                            <td class="py-1">
                                <label class="inline-flex items-center gap-1.5 text-xs text-gray-600 cursor-pointer mr-3">
                                    <input type="radio" th:field="*{active}" th:value="true" class="accent-green-500">
                                    Activo
                                </label>
                                <label class="inline-flex items-center gap-1.5 text-xs text-gray-600 cursor-pointer">
                                    <input type="radio" th:field="*{active}" th:value="false" class="accent-red-500">
                                    Inactivo
                                </label>
                            </td>
                        </tr>
                    </table>
                </fieldset>
            </div>

            <!-- Dirección -->
            <fieldset class="border border-gray-300 px-3 pt-2 pb-1 flex-1 min-w-[280px]">
                <legend class="text-xs font-semibold text-gray-700 px-1">Dirección</legend>
                <table class="w-full">
                    <tr>
                        <td class="w-24 py-1 pr-2">
                            <label class="text-xs text-gray-600">Provincia</label>
                        </td>
                        <td class="py-1">
                            <select th:field="*{province}"
                                    class="w-full border border-gray-300 bg-white px-2 py-1 text-xs focus:border-gray-500 focus:outline-none">
                                <option th:each="p : ${provinces}" th:value="${p.displayName}" th:text="${p.displayName}"></option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td class="w-24 py-1 pr-2">
                            <label class="text-xs text-gray-600">Ciudad</label>
                        </td>
                        <td class="py-1">
                            <input type="text" th:field="*{city}"
                                   class="w-full border border-gray-300 bg-white px-2 py-1 text-xs focus:border-gray-500 focus:outline-none">
                        </td>
                    </tr>
                    <tr>
                        <td class="w-24 py-1 pr-2">
                            <label class="text-xs text-gray-600">Barrio</label>
                        </td>
                        <td class="py-1">
                            <input type="text" th:field="*{neighborhood}"
                                   class="w-full border border-gray-300 bg-white px-2 py-1 text-xs focus:border-gray-500 focus:outline-none">
                        </td>
                    </tr>
                    <tr>
                        <td class="w-24 py-1 pr-2">
                            <label class="text-xs text-gray-600">Calle</label>
                        </td>
                        <td class="py-1">
                            <input type="text" th:field="*{street}"
                                   class="w-full border border-gray-300 bg-white px-2 py-1 text-xs focus:border-gray-500 focus:outline-none">
                        </td>
                    </tr>
                    <tr>
                        <td class="w-24 py-1 pr-2">
                            <label class="text-xs text-gray-600">Número</label>
                        </td>
                        <td class="py-1">
                            <input type="text" th:field="*{number}"
                                   class="w-full border border-gray-300 bg-white px-2 py-1 text-xs focus:border-gray-500 focus:outline-none">
                        </td>
                    </tr>
                    <tr>
                        <td class="w-24 py-1 pr-2">
                            <label class="text-xs text-gray-600">C.P.</label>
                        </td>
                        <td class="py-1">
                            <input type="text" th:field="*{postalCode}"
                                   class="w-full border border-gray-300 bg-white px-2 py-1 text-xs focus:border-gray-500 focus:outline-none">
                        </td>
                    </tr>
                    <tr>
                        <td class="w-24 py-1 pr-2">
                            <label class="text-xs text-gray-600">País</label>
                        </td>
                        <td class="py-1">
                            <select th:field="*{country}"
                                    class="w-full border border-gray-300 bg-white px-2 py-1 text-xs focus:border-gray-500 focus:outline-none">
                                <option th:each="c : ${countries}" th:value="${c.displayName}" th:text="${c.displayName}"></option>
                            </select>
                        </td>
                    </tr>

                </table>
            </fieldset>
        </div>

    </div>

    <!-- Footer -->
    <div class="px-4 pt-3 pb-6 border-t border-gray-300 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <button type="submit"
                    class="hover:bg-primary hover:text-white text-slate-900 border border-gray-300 px-4 py-1 text-xs font-medium rounded-sm dark:hover:bg-slate-900/80 dark:hover:text-white">
                <span th:text="${editMode} ? 'Actualizar' : 'Guardar'"></span>
            </button>
            <a th:href="@{/customer}"
               class="hover:bg-primary hover:text-white text-slate-900 border border-gray-300 px-4 py-1 text-xs font-medium no-underline inline-block rounded-sm dark:hover:bg-slate-900/80 dark:hover:text-white">
                Volver
            </a>
        </div>
    </div>
    <div class="bg-primary/80 dark:bg-slate-900/90" style="height: 20px"></div>

    </form>

</div>

<script th:src="@{/js/cuit-mask.js}"></script>
