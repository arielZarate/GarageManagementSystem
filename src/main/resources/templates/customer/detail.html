<div th:fragment="content" class="border border-outline-variant bg-surface-container rounded-md overflow-hidden">

    <!-- Header -->
    <div class="bg-primary/80 dark:bg-slate-900/90 px-4 py-2 border-b border-outline-variant flex items-center justify-between">
        <h1 class="text-sm font-bold text-white">
            <span th:text="${customer.firstName} + ' ' + ${customer.lastName}"></span>
            <span class="text-white/60 font-normal" th:text="'(' + ${customer.customerCode} + ')'"></span>
        </h1>
    </div>

    <!-- Body -->
    <div class="p-4">

        <div class="flex flex-wrap gap-4">

            <!-- Datos Personales -->
            <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                <legend class="text-xs font-semibold text-on-surface px-1">Datos Personales</legend>
                <table class="w-full text-xs">
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap w-1/3">Código</td>
                        <td class="text-on-surface font-mono py-1" th:text="${customer.customerCode}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">DNI</td>
                        <td class="text-on-surface py-1">
                            <span class="inline-flex items-center gap-1 relative group">
                                <span th:text="${customer.dni}"></span>
                                <button class="inline-flex items-center justify-center p-0.5 border-0 bg-transparent text-on-surface/40 cursor-pointer opacity-0 group-hover:opacity-100 hover:text-primary" th:data-copy="${customer.dni}" title="Copiar DNI">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                    </svg>
                                </button>
                                <span class="absolute bottom-full left-1/2 -translate-x-1/2 scale-90 bg-inverse-surface text-inverse-on-surface text-[0.625rem] px-2 py-0.5 whitespace-nowrap opacity-0 pointer-events-none transition-all">Copiado</span>
                            </span>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">CUIT</td>
                        <td class="text-on-surface font-mono py-1">
                            <span class="inline-flex items-center gap-1 relative group">
                                <span th:with="c=${customer.cuit}" th:text="${#strings.substring(c,0,2)} + '-' + ${#strings.substring(c,2,10)} + '-' + ${#strings.substring(c,10)}"></span>
                                <button class="inline-flex items-center justify-center p-0.5 border-0 bg-transparent text-on-surface/40 cursor-pointer opacity-0 group-hover:opacity-100 hover:text-primary" th:data-copy="${customer.cuit}" title="Copiar CUIT">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                    </svg>
                                </button>
                                <span class="absolute bottom-full left-1/2 -translate-x-1/2 scale-90 bg-inverse-surface text-inverse-on-surface text-[0.625rem] px-2 py-0.5 whitespace-nowrap opacity-0 pointer-events-none transition-all">Copiado</span>
                            </span>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Estado</td>
                        <td class="py-1">
                            <span th:if="${customer.active}"
                                  class="inline-flex items-center gap-1 bg-green-100 text-green-700 text-xs font-medium px-2 py-0.5 rounded-full">
                                <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                                Activo
                            </span>
                            <span th:unless="${customer.active}"
                                  class="inline-flex items-center gap-1 bg-red-100 text-red-700 text-xs font-medium px-2 py-0.5 rounded-full">
                                <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                                Inactivo
                            </span>
                        </td>
                    </tr>
                </table>
            </fieldset>

            <!-- Contacto -->
            <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                <legend class="text-xs font-semibold text-on-surface px-1">Contacto</legend>
                <table class="w-full text-xs">
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap w-1/3">Email</td>
                        <td class="text-on-surface py-1" th:text="${customer.email}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Teléfono</td>
                        <td class="text-on-surface py-1" th:text="${customer.phone}"></td>
                    </tr>
                </table>
            </fieldset>

            <!-- Dirección -->
            <fieldset class="border border-outline-variant px-3 pt-2 pb-3 min-w-[280px] flex-1">
                <legend class="text-xs font-semibold text-on-surface px-1">Dirección</legend>
                <table class="w-full text-xs">
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap w-1/3">Provincia</td>
                        <td class="text-on-surface py-1" th:text="${customer.address?.province ?: '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Ciudad</td>
                        <td class="text-on-surface py-1" th:text="${customer.address?.city ?: '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Barrio</td>
                        <td class="text-on-surface py-1" th:text="${customer.address?.neighborhood ?: '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Calle</td>
                        <td class="text-on-surface py-1" th:text="|${customer.address?.street ?: '-'} ${customer.address?.number ?: ''}|"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">Código Postal</td>
                        <td class="text-on-surface py-1" th:text="${customer.address?.postalCode ?: '-'}"></td>
                    </tr>
                    <tr>
                        <td class="text-on-surface/60 py-1 pr-3 whitespace-nowrap">País</td>
                        <td class="text-on-surface py-1" th:text="${customer.address?.country ?: '-'}"></td>
                    </tr>
                </table>
            </fieldset>

        </div>

    </div>

    <!-- Footer -->
    <div class="px-4 pt-3 pb-6 border-t border-outline-variant flex items-center justify-between">
        <div class="flex items-center gap-2">
            <a th:href="@{/customer/edit/{id}(id=${customer.id})}"
               class="hover:bg-primary hover:text-white text-on-surface border border-outline-variant px-4 py-1 text-xs font-medium no-underline inline-block rounded-sm dark:hover:bg-slate-900 dark:hover:text-white">
                <span class="flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                    Editar
                </span>
            </a>
            <a th:href="@{/customer}"
               class="hover:bg-primary hover:text-white text-on-surface border border-outline-variant px-4 py-1 text-xs font-medium no-underline inline-block rounded-sm dark:hover:bg-slate-900 dark:hover:text-white">
                Volver
            </a>
        </div>
    </div>
    <div class="bg-primary/80 dark:bg-slate-900/90" style="height: 20px"></div>

</div>

<script>
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('[data-copy]');
        if (!btn) return;

        var text = btn.getAttribute('data-copy');
        if (!text) return;

        navigator.clipboard.writeText(text).then(function() {
            var tooltip = btn.parentElement.querySelector('.scale-90');
            if (!tooltip) return;

            tooltip.classList.remove('scale-90', 'opacity-0');
            tooltip.classList.add('scale-100', 'opacity-100');
            setTimeout(function() {
                tooltip.classList.remove('scale-100', 'opacity-100');
                tooltip.classList.add('scale-90', 'opacity-0');
            }, 1200);
        }).catch(function() {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        });
    });
</script>
