<th:block th:fragment="searchInput(baseUrl, placeholder, query)">

    <div class="mb-4">
        <form th:action="@{__${baseUrl}__}" method="get" class="flex gap-2">
            <div class="relative flex-1 max-w-xs">
                <svg class="w-4 h-4 text-on-surface/40 absolute left-2 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="text" name="q" th:value="${__${query}__}"
                       th:placeholder="${placeholder}"
                       class="w-full border border-outline-variant bg-surface-container-low px-2 py-1 text-xs pl-8 text-on-surface focus:border-on-surface focus:outline-none">
            </div>
            <button type="submit"
                    class="bg-surface-container-low hover:bg-primary/80 hover:text-white text-on-surface border border-outline-variant px-3 py-1 text-xs font-medium rounded-sm">
                Buscar
            </button>
            <a th:href="@{__${baseUrl}__}" th:if="${__${query}__ != null}"
               class="bg-surface-container-low hover:bg-primary/80 hover:text-white text-on-surface border border-outline-variant px-3 py-1 text-xs font-medium rounded-sm no-underline inline-block">
                Limpiar
            </a>
        </form>
    </div>

</th:block>
