
<!--badge estado (sin td) - reusable en listas y detail-->
<th:block th:fragment="statusBadge(field)">
    <span th:if="${__${field}__}"
          class="inline-flex items-center gap-1 bg-green-100 text-green-700 text-xs font-medium px-2 py-1 rounded-full">
        <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
        Activo
    </span>
    <span th:unless="${__${field}__}"
          class="inline-flex items-center gap-1 bg-red-100 text-red-700 text-xs font-medium px-2 py-1 rounded-full">
        <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
        Inactivo
    </span>
</th:block>

<!--celda estado (con td) - solo para listas-->
<th:block th:fragment="status(field)">
    <td class="px-3 py-2 text-center">
        <th:block th:replace="~{fragments/components/UI/list-input :: statusBadge(field=${field})}"></th:block>
    </td>
</th:block>


<!--boton copiar + tooltip (sin td) - reusable en listas y detail-->
<th:block th:fragment="copyButton(value, title)">
    <span class="inline-flex items-center gap-1 relative group">
        <span th:text="${value}"></span>
        <button class="inline-flex items-center justify-center p-0.5 border-0 bg-transparent text-on-surface/40 cursor-pointer opacity-0 group-hover:opacity-100 hover:text-primary"
                th:data-copy="${value}" th:title="${title}">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>
        </button>
        <span class="absolute bottom-full left-1/2 -translate-x-1/2 scale-90 bg-inverse-surface text-inverse-on-surface text-[0.625rem] px-2 py-0.5 whitespace-nowrap opacity-0 pointer-events-none transition-all">Copiado</span>
    </span>
</th:block>


<!--actions table: detail more edit -->
<th:block th:fragment="actions(baseUrl, id)">
    <td class="px-3 py-2 text-center">
        <div class="flex items-center justify-center gap-1">
            <a th:href="@{__${baseUrl}__/detail/{id}(id=${id})}"
               class="p-1.5 rounded hover:bg-primary-container text-primary transition" title="Ver detalle">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
            </a>
            <a th:href="@{__${baseUrl}__/edit/{id}(id=${id})}"
               class="p-1.5 rounded hover:bg-secondary-container text-secondary transition" title="Editar">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
            </a>
        </div>
    </td>
</th:block>
