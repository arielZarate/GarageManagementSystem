<div th:fragment="modal(modalId, title)"
     th:id="${modalId}"
     class="fixed inset-0 z-50 hidden"
     role="dialog">
    <div class="fixed inset-0 bg-black/50"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
        <div class="relative bg-surface-container rounded-lg shadow-xl w-full max-w-md z-10">
            <div class="flex items-center justify-between px-4 py-3 border-b border-outline-variant">
                <h2 class="text-sm font-bold text-on-surface" th:text="${title}"></h2>
                <button type="button"
                        th:attr="onclick='closeModal(\'' + ${modalId} + '\')'"
                        class="text-on-surface/60 hover:text-on-surface p-1 rounded hover:bg-surface-container-low transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="p-4">
                <th:block th:replace="~{${content}}"></th:block>
            </div>
        </div>
    </div>
</div>
