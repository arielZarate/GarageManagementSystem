<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Gestion de Taller</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="font-sans bg-surface min-h-screen flex flex-col">
    <div th:replace="~{fragments/components/navbar :: navbar}"></div>
    <div th:replace="~{fragments/components/sidebar :: sidebar}"></div>
    <div th:replace="~{fragments/components/overlay :: overlay}"></div>

    <main class="flex-1 p-8 max-w-6xl mx-auto w-full">

    </main>

    <div th:replace="~{fragments/components/footer :: footer}"></div>
    <div th:replace="~{fragments/components/scripts :: scripts}"></div>

</html>
